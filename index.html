<title>HSG Unterweser CII</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#05101f;--bg2:#0b1929;--bg3:#112240;--panel:#091526;
  --b1:rgba(255,255,255,0.06);--b2:rgba(61,142,240,0.22);
  --blue:#1e6fe0;--blue2:#5aaeff;
  --amber:#f0a500;--amber2:#ffc62b;
  --green:#22c55e;--red:#ef4444;--steel:#94a3b8;
  --white:#e8f0fe;--text:#b8cce0;--muted:#4e6a88;
  --r:12px;--shadow:0 8px 32px rgba(0,0,0,.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text)}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* HEADER */
header{background:linear-gradient(90deg,#060d1a,#0c1b34);border-bottom:1px solid var(--b2);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 24px rgba(0,0,0,.8);z-index:200;position:relative}
.logo{width:38px;height:38px;border-radius:10px;overflow:hidden;flex-shrink:0;border:1.5px solid var(--b2);box-shadow:0 0 20px rgba(30,111,224,.4)}
.logo img{width:100%;height:100%;object-fit:cover;display:block}
.hd-info h1{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--white);line-height:1}
.hd-info small{font-size:10px;color:var(--muted)}
.hd-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.hd-btn{background:var(--bg3);border:1px solid var(--b2);color:var(--blue2);border-radius:8px;padding:7px 10px;font-size:15px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.5px;transition:all .15s;line-height:1}
.hd-btn:active{background:var(--blue);transform:scale(.93)}
.admin-dot{width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 6px var(--amber);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* SAISON-SWITCHER */
.season-bar{display:flex;gap:6px;padding:10px 14px 2px;background:var(--bg);flex-shrink:0;border-bottom:1px solid var(--b1)}
.season-btn{flex:1;padding:7px 4px;border-radius:8px;border:1px solid var(--b1);background:var(--bg3);color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;cursor:pointer;text-align:center;transition:all .15s}
.season-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 12px rgba(30,111,224,.4)}

/* NAV */
nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--b1);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 12px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px}
.tab.on{color:var(--blue2);border-bottom-color:var(--blue2)}
.ti{font-size:13px}

/* VIEWS */
.view{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.view.on{display:block}
.pad{padding:12px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:10px;animation:fadeUp .3s ease both}
.card.au{animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.shdr{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:10px 0 6px;margin-top:6px}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.stat-box{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:12px;text-align:center}
.stat-val{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--white);line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.5px;text-transform:uppercase}

/* GAME CARD */
.game-card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:12px;margin-bottom:8px;animation:fadeUp .25s ease both}
.game-card.win{border-left:3px solid var(--green)}
.game-card.loss{border-left:3px solid var(--red)}
.game-card.draw{border-left:3px solid var(--amber)}
.game-card.upcoming{border-left:3px solid var(--blue)}
.game-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.game-round{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.game-date{font-size:10px;color:var(--muted)}
.game-teams{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--white);margin-bottom:4px;line-height:1.3}
.game-score{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--amber);margin-bottom:4px}
.game-venue{font-size:11px;color:var(--muted)}
.game-note{font-size:11px;color:var(--text);margin-top:6px;padding-top:6px;border-top:1px solid var(--b1);line-height:1.5}
.badge-home{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-left:6px}
.badge-home.h{background:rgba(30,111,224,.2);color:var(--blue2)}
.badge-home.a{background:rgba(148,163,184,.1);color:var(--muted)}

/* TORJAEGER */
.scorer-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)}
.scorer-rank{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;width:28px;flex-shrink:0;text-align:center}
.scorer-bar-wrap{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.scorer-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--blue2))}

/* HIGHLIGHTS */
.hl-card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:10px;overflow:hidden;cursor:pointer}
.hl-header{padding:14px;display:flex;align-items:center;gap:12px}
.hl-icon{font-size:28px;flex-shrink:0}
.hl-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--white)}
.hl-sub{font-size:11px;color:var(--muted);margin-top:2px}
.hl-badge{margin-left:auto;padding:3px 8px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0}
.hl-badge.turnier{background:rgba(240,165,0,.15);color:var(--amber);border:1px solid rgba(240,165,0,.3)}
.hl-badge.event{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.hl-body{display:none;padding:0 14px 14px;border-top:1px solid var(--b1)}
.hl-body.open{display:block}
.hl-tabs{display:flex;gap:6px;margin:10px 0}
.hl-tab{padding:5px 10px;border-radius:6px;border:1px solid var(--b1);background:var(--bg3);color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.hl-tab.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* TURNIERBAUM */
.bracket{overflow-x:auto;padding:6px 0}
.bracket-round{display:flex;flex-direction:column;gap:8px;min-width:150px;margin-right:16px}
.bracket-match{background:var(--bg3);border:1px solid var(--b1);border-radius:8px;padding:8px;font-size:12px}
.bracket-match .t{padding:2px 0;display:flex;justify-content:space-between}
.bracket-match .t.win{color:var(--green);font-weight:700}
.bracket-rounds{display:flex;align-items:flex-start;padding:8px 0}
.group-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.group-box{background:var(--bg3);border:1px solid var(--b2);border-radius:10px;padding:10px}
.group-title{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue2);margin-bottom:8px}
.group-team{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--b1)}
.group-team:last-child{border-bottom:none}
.group-team.advance{color:var(--green);font-weight:600}
.ko-phase{margin-top:4px}
.ko-title{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--amber);margin-bottom:8px;padding-top:8px;border-top:1px solid var(--b1)}
.ko-match{background:var(--bg3);border:1px solid var(--b1);border-radius:8px;padding:8px 10px;margin-bottom:6px}
.ko-match-label{font-size:10px;color:var(--muted);margin-bottom:4px;font-family:'Rajdhani',sans-serif;letter-spacing:.5px}
.ko-team{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.ko-team.win{color:var(--green);font-weight:700}

/* GALERIE */
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:3px}
.foto-thumb{aspect-ratio:1;overflow:hidden;cursor:pointer;background:var(--bg3);position:relative}
.foto-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .2s ease;display:block}
/* Highlight-Fotos: 2-spaltig, contain damit nichts abgeschnitten wird */
.hl-foto-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:4px 0}
.hl-foto-thumb{aspect-ratio:4/3;overflow:hidden;cursor:pointer;background:var(--bg3);border-radius:8px;border:1px solid var(--b1)}
.hl-foto-thumb img{width:100%;height:100%;object-fit:contain;display:block;transition:transform .2s ease}
.hl-foto-thumb:active img{transform:scale(.97)}
.foto-thumb.loading{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* LIGHTBOX */
.lb{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb-img{max-width:100%;max-height:80vh;object-fit:contain;border-radius:4px;user-select:none;transition:opacity .25s ease}
.lb-bar{display:flex;align-items:center;justify-content:space-between;width:100%;padding:14px 20px;flex-shrink:0}
.lb-count{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1px}
.lb-close{font-size:28px;color:var(--white);cursor:pointer;padding:4px 10px;line-height:1}
.lb-nav{display:flex;gap:10px}
.lb-btn{background:var(--bg3);border:1px solid var(--b2);color:var(--white);border-radius:8px;padding:10px 18px;font-size:20px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700}
.lb-btn:active{background:var(--blue)}

/* BUTTONS */
.btn{display:block;width:100%;padding:12px;border-radius:10px;border:none;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;margin-bottom:8px;transition:all .15s}
.btn-p{background:var(--blue);color:#fff}
.btn-p:active{background:#1558b0}
.btn-g{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.btn-d{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-sm{padding:8px;font-size:12px}
.nl-btn{display:block;text-align:center;text-decoration:none;background:var(--bg3);border:1px solid var(--b2);color:var(--blue2);border-radius:10px;padding:12px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.nl-btn:active{background:var(--blue);color:#fff}

/* FORM */
input,textarea,select{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--b1);border-radius:8px;color:var(--white);font-family:'Exo 2',sans-serif;font-size:14px;margin-bottom:8px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue2)}
label{font-size:11px;color:var(--muted);margin-bottom:3px;display:block;letter-spacing:.5px;text-transform:uppercase}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--b2);color:var(--white);padding:10px 18px;border-radius:10px;font-size:13px;font-family:'Rajdhani',sans-serif;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:800;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;padding:20px;width:100%;max-width:380px}

/* ARCHIV */
.archiv-season{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.archiv-season-header{padding:14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.archiv-season-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--white)}
.archiv-season-body{display:none;padding:0 14px 14px}
.archiv-season-body.open{display:block}
.archiv-sub-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.archiv-sub-tab{padding:5px 10px;border-radius:6px;border:1px solid var(--b1);background:var(--bg3);color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.archiv-sub-tab.on{background:var(--amber);border-color:var(--amber);color:#000}

/* LOADING */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--b2);border-top-color:var(--blue2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.gs-banner{padding:8px 14px;font-size:11px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.5px;text-align:center;flex-shrink:0}
.gs-banner.ok{background:rgba(34,197,94,.1);color:var(--green)}
.gs-banner.err{background:rgba(239,68,68,.1);color:var(--red)}
</style>
</head>

function gsReadJSONP() {
  return new Promise(resolve => {
    const cb = "hsg_cb_" + Date.now();
    const script = document.createElement("script");
    let done = false;
    const finish = r => {
      if(done) return; done=true;
      try{delete window[cb];}catch(e){}
      try{if(script.parentNode)script.parentNode.removeChild(script);}catch(e){}
      resolve(r);
    };
    const timer = setTimeout(()=>finish(null), 10000);
    window[cb] = resp => {
      clearTimeout(timer);
      if(!resp||!resp.ok){finish(null);return;}
      finish(Object.assign({},resp.data,{_writeTs:resp._writeTs||null}));
    };
    script.type="text/javascript"; script.async=true;
    script.src = GS_URL+"?action=read&callback="+cb+"&t="+Date.now();
    script.onerror = ()=>{ clearTimeout(timer); finish(null); };
    document.head.appendChild(script);
  });
}

async function gsWrite(data) {
  const writeTs = Date.now();
  const payload = { action:"write", data:{ ...data, _writeTs:writeTs } };
  try {
    fetch(GS_URL, { method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain"}, body:JSON.stringify(payload) });
  } catch(e) {}
  const deadline = Date.now() + 10000;
  while(Date.now() < deadline) {
    await new Promise(r => setTimeout(r, 2500));
    const check = await gsReadJSONP();
    if(check && check._writeTs === writeTs) return true;
  }
  return false;
}

    const cached = LS.get("hsg_v5");
    if (cached && cached.seasons && cached.seasons["2025-26"] &&

      STATE.highlights = [JSON.parse(JSON.stringify(ARNHEM_CUP))];
      await saveAll();
    }
    LS.set("hsg_v5", {seasons: STATE.seasons, highlights: STATE.highlights});
    setBanner("&#9679; Google Sheets verbunden", true);

  } else {
    // Offline — localStorage nutzen
    const cached = LS.get("hsg_v5");
    if (cached && cached.seasons && cached.seasons["2025-26"]) {
      STATE.seasons    = cached.seasons;
      STATE.highlights = cached.highlights || [];
      setBanner("&#9651; Offline — lokale Daten", false);
    } else {

      STATE.highlights = [JSON.parse(JSON.stringify(ARNHEM_CUP))];
      setBanner("&#9651; Offline — Standarddaten", false);
    }
  }
  renderActive();
}

function fmtDate(d) {
  if(!d) return "";
  try {
    if(typeof d==="string" && d.length===10 && d[4]==="-") {
      const p=d.split("-"); return p[2]+"."+p[1]+"."+p[0];
    }
    const dt=new Date(d);
    if(!isNaN(dt.getTime())) return String(dt.getDate()).padStart(2,"0")+"."+String(dt.getMonth()+1).padStart(2,"0")+"."+dt.getFullYear();
  } catch(e) {}
  return String(d);
}
function fmtTime(t) {
  if(!t) return "";
  if(typeof t==="string" && t.length>=4 && t[2]===":") return t.substring(0,5);
  try { const d=new Date(t); if(!isNaN(d.getTime())) return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); } catch(e) {}
  return String(t);
}
function isPlayed(g) { return g.scoreH !== undefined && g.scoreH !== null && g.scoreH !== ""; }
function ourScore(g) { return g.isHome ? g.scoreH : g.scoreA; }
function oppScore(g) { return g.isHome ? g.scoreA : g.scoreH; }
function result(g) {
  if(!isPlayed(g)) return "upcoming";
  const o=ourScore(g), e=oppScore(g);
  return o>e?"win":o<e?"loss":"draw";
}
function fixName(n) { return NAME_FIX[n] || n; }

function parseScorers(gameList) {
  const map = {};
  gameList.filter(g=>isPlayed(g)&&g.note).forEach(g=>{
    g.note.split(";").forEach(part=>{
      part = part.trim();
      // Matcht: "Name Zahl Tor..."  UND  "Name Zahl (7M..."  UND  "Name Zahl" am Ende
      const m = part.match(/^([A-ZÄÖÜa-zäöü\-]+)\s+(\d+)(?:\s+Tor|\s*\(|\s*$)/i);
      if(!m) return;
      const name = fixName(m[1]);
      const tore = parseInt(m[2]);
      const m7 = part.match(/7M\s+(\d+)\/(\d+)/i);
      if(!map[name]) map[name]={name,tore:0,spiele:0,m7t:0,m7v:0,best:0};
      map[name].tore += tore;
      map[name].spiele++;
      map[name].best = Math.max(map[name].best, tore);
      if(m7){ map[name].m7t+=parseInt(m7[1]); map[name].m7v+=parseInt(m7[2]); }
    });
  });
  return Object.values(map).sort((a,b)=>b.tore-a.tore);
}

function gameCardHTML(g, showEdit=false) {
  const r = result(g);
  const our = ourScore(g), opp = oppScore(g);
  const opp_team = g.isHome ? g.teamAway : g.teamHome;
  const editBtn = showEdit && STATE.isAdmin ?
    `<button class="btn btn-sm" style="margin-top:8px;width:auto;padding:5px 12px" onclick="startEdit('${g.id}')">&#9998; Bearbeiten</button>` : "";
  const pdfBtn = g.pdf ?
    `<a href="${g.pdf}" target="_blank" style="display:inline-block;margin-top:6px;font-size:11px;color:var(--blue2)">&#128196; Spielbericht</a>` : "";
  return `<div class="game-card ${r}">
    <div class="game-meta">
      <span class="game-round">${g.round||""}</span>
      <span class="game-date">${fmtDate(g.date)} ${fmtTime(g.time)}</span>
    </div>
    <div class="game-teams">${opp_team}<span class="badge-home ${g.isHome?'h':'a'}">${g.isHome?"Heim":"Auswärts"}</span></div>
    ${isPlayed(g)
      ? `<div class="game-score">${our} : ${opp} <span style="font-size:13px;color:${r==='win'?'var(--green)':r==='loss'?'var(--red)':'var(--amber)'}">${r==='win'?'SIEG':r==='loss'?'NIEDERLAGE':'UNENTSCHIEDEN'}</span></div>`
      : `<div style="font-size:13px;color:var(--muted);padding:4px 0">Noch nicht gespielt</div>`}
    <div class="game-venue">&#128205; ${g.venue||""}</div>
    ${g.note?`<div class="game-note">&#9917; ${g.note}</div>`:""}
    ${pdfBtn}${editBtn}
  </div>`;
}

  const pts = wins*2 + draws;
  const rk = rank();

  const last = played[played.length-1];
  const sName = STATE.seasons[STATE.activeSeason]?.name || "";

    <div class="stat-box"><div class="stat-val">${pts}</div><div class="stat-lbl">Punkte</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--green)">${wins}</div><div class="stat-lbl">Siege</div></div>
    <div class="stat-box"><div class="stat-val">${draws}</div><div class="stat-lbl">Unentschieden</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--red)">${losses}</div><div class="stat-lbl">Niederlagen</div></div>
    <div class="stat-box"><div class="stat-val">${goalsFor}:${goalsAg}</div><div class="stat-lbl">Tore</div></div>
  </div>`;

  if(next) {
    h += `<div class="shdr">Nächstes Spiel</div>`;
    h += gameCardHTML(next);
  }
  if(last) {
    h += `<div class="shdr">Letztes Ergebnis</div>`;
    h += gameCardHTML(last);
  }

  h += `<div class="shdr">nuLiga Links</div>`;
  const nl = STATE.seasons[STATE.activeSeason]?.nuliga || NULIGA;
  if(nl) {
    h += `<a class="nl-btn" href="${nl.meetings}" target="_blank">&#128197; Spielplan auf nuLiga</a>`;
    h += `<a class="nl-btn" href="${nl.results}"  target="_blank">&#9917; Ergebnisse auf nuLiga</a>`;
    h += `<a class="nl-btn" href="${nl.tabelle}"  target="_blank">&#128202; Tabelle auf nuLiga</a>`;
  } else {
    h += `<div style="color:var(--muted);font-size:12px">nuLiga-Links für diese Saison noch nicht eingerichtet.</div>`;
  }

  document.getElementById("view-overview").innerHTML = h;
}

function renderSaison() {

// ═══════════════════════════════════════
// TORJÄGER
// ═══════════════════════════════════════
function renderTorjaeger() {
  const scorers = parseScorers(games());
  const maxT = scorers[0]?.tore || 1;
  const totalGoals = scorers.reduce((s,x)=>s+x.tore,0);

  const medals = ["&#129351;","&#129352;","&#129353;"];
  let h = `<div class="shdr" style="margin-top:0">Torjägerliste · ${STATE.seasons[STATE.activeSeason]?.name||""}</div>`;

  if(!scorers.length) {
    h += `<div style="color:var(--muted);font-size:13px;padding:20px 0;text-align:center">Noch keine Torschützen erfasst.</div>`;
  } else {
    scorers.forEach((s,i) => {
      const pct = Math.round(s.tore/maxT*100);
      const share = totalGoals>0 ? Math.round(s.tore/totalGoals*100) : 0;
      const m7q = s.m7v>0 ? Math.round(s.m7t/s.m7v*100) : null;
      h += `<div class="scorer-row">
        <div class="scorer-rank" style="color:${i<3?['#ffd700','#c0c0c0','#cd7f32'][i]:'var(--muted)'}">${i<3?medals[i]:i+1}</div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--white)">${s.name}</span>
            <span style="font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--amber)">${s.tore} Tore</span>
          </div>
          <div class="scorer-bar-wrap"><div class="scorer-bar" style="width:${pct}%"></div></div>
          <div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap">
            <span style="font-size:10px;color:var(--muted)">${s.spiele} Spiele · Ø ${(s.tore/s.spiele).toFixed(1)} · Best: ${s.best}</span>
            <span style="font-size:10px;color:var(--muted)">${share}% der Teamtore</span>
            ${m7q!==null?`<span style="font-size:10px;color:${m7q>=70?'var(--green)':m7q>=40?'var(--amber)':'var(--red)'}">7M: ${s.m7t}/${s.m7v} (${m7q}%)</span>`:""}
          </div>
        </div>
      </div>`;
    });
  }
  document.getElementById("view-torjaeger").innerHTML = h;
}

function toggleHL(idx) {
  const body = document.getElementById("hl-body-"+idx);
  const wasOpen = body.classList.contains("open");
  body.classList.toggle("open");
  // Inhalt neu rendern beim Öffnen damit Admin-Buttons korrekt erscheinen
  if(!wasOpen) {
    document.getElementById("hl-content-"+idx).innerHTML = renderHLSpiele(STATE.highlights[idx], idx);
  }
}

function hlTab(idx, tab) {
  document.querySelectorAll(`[id^="hlt-${idx}-"]`).forEach(t=>t.classList.remove("on"));
  document.getElementById(`hlt-${idx}-${tab}`)?.classList.add("on");
  const hl = STATE.highlights[idx];
  let c = "";
  if(tab==="spiele")    c = renderHLSpiele(hl, idx);
  if(tab==="torjaeger") c = renderHLTorjaeger(hl);
  if(tab==="bracket")   c = renderHLBracket(hl);
  if(tab==="fotos")     c = renderHLFotos(hl, idx);
  document.getElementById("hl-content-"+idx).innerHTML = c;
}

function dedupGames(games) {
  // Entfernt Duplikate anhand Teamkombination — behält jeweils den neueren Eintrag
  const seen = new Map();
  games.forEach((g, i) => {
    const key = [g.teamHome, g.teamAway].sort().join("||");
    if(!seen.has(key)) {
      seen.set(key, i);
    } else {
      // Neueren behalten: den mit Ergebnis bevorzugen
      const prevIdx = seen.get(key);
      const prev = games[prevIdx];
      if(g.scoreH !== undefined && prev.scoreH === undefined) seen.set(key, i);
    }
  });
  return Array.from(seen.values()).map(i => games[i]);
}

function renderHLSpiele(hl, idx) {
  const gs = dedupGames(hl.games||[]);
  let h = "";
  if(!gs.length) {
    h += `<div style="color:var(--muted);font-size:12px;padding:10px 0">Noch keine Spiele eingetragen.</div>`;
  } else {
    gs.forEach((g, gi) => {
      // Originalen Index für editHLGame ermitteln
      const origIdx = (hl.games||[]).findIndex(x => x.id === g.id);
      const editBtn = STATE.isAdmin ?
        `<button class="btn btn-sm" style="margin-top:6px;width:auto;padding:4px 10px" onclick="editHLGame(${idx},${origIdx})">&#9998;</button>` : "";
      h += gameCardHTML(g) + (STATE.isAdmin ? editBtn : "");
    });
  }
  if(STATE.isAdmin) {
    h += `<button class="btn btn-g btn-sm" onclick="addHLGame(${idx})">&#43; Spiel hinzufügen</button>`;
    // Bereinigungsbutton nur anzeigen wenn Duplikate vorhanden
    const allGames = hl.games||[];
    const deduped = dedupGames(allGames);
    if(allGames.length > deduped.length) {
      h += `<button class="btn btn-d btn-sm" style="margin-top:4px" onclick="bereinigeDuplikate(${idx})">
        &#9888; ${allGames.length - deduped.length} Duplikat${allGames.length-deduped.length>1?'e':''} entfernen
      </button>`;
    }
  }
  return h;
}

function bereinigeDuplikate(hlIdx) {
  const hl = STATE.highlights[hlIdx];
  if(!hl || !hl.games) return;
  const vorher = hl.games.length;
  hl.games = dedupGames(hl.games);
  const nachher = hl.games.length;
  saveAll().then(() => {
    toast("&#9989; " + (vorher-nachher) + " Duplikat(e) entfernt");
    renderHighlights();
  });
}

function renderHLTorjaeger(hl) {
  const scorers = parseScorers(dedupGames(hl.games||[]));
  if(!scorers.length) return `<div style="color:var(--muted);font-size:12px;padding:10px 0">Noch keine Torschützen.</div>`;
  const maxT = scorers[0].tore;
  const medals = ["&#129351;","&#129352;","&#129353;"];
  return scorers.map((s,i) => `<div class="scorer-row">
    <div class="scorer-rank" style="color:${i<3?['#ffd700','#c0c0c0','#cd7f32'][i]:'var(--muted)'}">${i<3?medals[i]:i+1}</div>
    <div style="flex:1">
      <div style="display:flex;justify-content:space-between">
        <span style="font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--white)">${s.name}</span>
        <span style="font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--amber)">${s.tore}</span>
      </div>

    </div>
  </div>`).join("");
}

function calcGroupTable(group, allGames) {
  // Berechnet Punkte automatisch aus den Spielen
  const stats = {};
  (group.teams||[]).forEach(t => {
    stats[t.name] = { name:t.name, pts:0, wins:0, draws:0, losses:0, gf:0, ga:0, played:0 };
  });
  dedupGames(allGames).filter(g => isPlayed(g)).forEach(g => {
    const h = g.teamHome, a = g.teamAway;
    if(!stats[h] && !stats[a]) return; // Nicht in dieser Gruppe
    if(stats[h]) { stats[h].gf+=g.scoreH; stats[h].ga+=g.scoreA; stats[h].played++; }
    if(stats[a]) { stats[a].gf+=g.scoreA; stats[a].ga+=g.scoreH; stats[a].played++; }
    if(g.scoreH > g.scoreA) {
      if(stats[h]) { stats[h].pts+=2; stats[h].wins++; }
      if(stats[a]) { stats[a].losses++; }
    } else if(g.scoreH < g.scoreA) {
      if(stats[a]) { stats[a].pts+=2; stats[a].wins++; }
      if(stats[h]) { stats[h].losses++; }
    } else {
      if(stats[h]) { stats[h].pts+=1; stats[h].draws++; }
      if(stats[a]) { stats[a].pts+=1; stats[a].draws++; }
    }
  });
  // Sortieren: Punkte → Tordifferenz → Tore
  return Object.values(stats).sort((a,b) =>
    (b.pts-a.pts) || ((b.gf-b.ga)-(a.gf-a.ga)) || (b.gf-a.gf)
  );
}

function renderHLBracket(hl) {
  if(!hl.bracket) return `<div style="color:var(--muted);font-size:12px;padding:10px 0">Noch kein Turnierbaum eingetragen.${STATE.isAdmin?` <button class="btn btn-g btn-sm" style="margin:0;width:auto;display:inline-block" onclick="openBracketEditor(${STATE.highlights.indexOf(hl)})">&#9998; Jetzt anlegen</button>`:''}</div>`;

  const hlIdx = STATE.highlights.indexOf(hl);
  let h = '';

  // GRUPPEN — automatische Tabellenberechnung
  const groups = hl.bracket.groups||[];
  if(groups.length) {
    h += `<div class="group-grid">`;
    groups.forEach(g => {
      const table = calcGroupTable(g, hl.games||[]);
      const hasPlayed = table.some(t => t.played > 0);
      h += `<div class="group-box"><div class="group-title">${g.name}</div>`;
      if(hasPlayed) {
        // Tabellenkopf
        h += `<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);padding:3px 0;border-bottom:1px solid var(--b1);margin-bottom:2px;letter-spacing:.5px">
          <span>TEAM</span><span style="display:flex;gap:8px"><span>Sp</span><span>Pkt</span><span>TD</span></span></div>`;
        table.forEach((t,i) => {
          const adv = i < (g.advance||2);
          const td = t.gf - t.ga;
          const isOurs = t.name.includes("Unterweser");
          h += `<div class="group-team ${adv?'advance':''}" style="${isOurs?'background:rgba(90,174,255,.06);border-radius:4px;':''}">
            <span>${adv?'&#9650; ':''}${t.name}</span>
            <span style="display:flex;gap:8px;font-size:11px">
              <span style="color:var(--muted)">${t.played}</span>
              <span style="font-weight:700;color:${adv?'var(--green)':'var(--white)'}">${t.pts}</span>
              <span style="color:${td>=0?'var(--green)':'var(--red)'}">${td>0?'+':''}${td}</span>
            </span>
          </div>`;
        });
      } else {
        // Noch keine Spiele — Teams nur auflisten
        (g.teams||[]).forEach((t,i) => {
          const adv = i < (g.advance||2);
          h += `<div class="group-team ${adv?'advance':''}">${adv?'&#9650; ':''}${t.name}<span style="color:var(--muted);font-size:10px">–</span></div>`;
        });
      }
      h += `</div>`;
    });
    h += `</div>`;
    // Schnelleingabe-Button für Admin
    if(STATE.isAdmin) {
      h += `<button class="btn btn-g btn-sm" style="margin-bottom:8px" onclick="openGruppenEingabe(${hlIdx})">&#9998; Gruppenspiele eintragen</button>`;
    }
  }

  // KO-RUNDEN
  const rounds = hl.bracket.rounds||[];
  if(rounds.length) {
    h += `<div class="ko-phase"><div class="ko-title">&#127942; K.O.-Phase</div>`;
    rounds.forEach(round => {
      (round.matches||[]).forEach(m => {
        const w1 = m.scoreH!==undefined && m.scoreH!=='' && parseInt(m.scoreH)>parseInt(m.scoreA);
        const w2 = m.scoreA!==undefined && m.scoreA!=='' && parseInt(m.scoreA)>parseInt(m.scoreH);
        const played = m.scoreH!==undefined && m.scoreH!=='';
        h += `<div class="ko-match">
          <div class="ko-match-label">${round.name}</div>
          <div class="ko-team ${w1?'win':''}">${m.teamHome||'TBD'}${played?' &nbsp; '+m.scoreH:''}</div>
          <div class="ko-team ${w2?'win':''}">${m.teamAway||'TBD'}${played?' &nbsp; '+m.scoreA:''}</div>
        </div>`;
      });
    });
    h += `</div>`;
  }

  if(STATE.isAdmin) h += `<button class="btn btn-g btn-sm" style="margin-top:6px" onclick="openBracketEditor(${STATE.highlights.indexOf(hl)})">&#9998; Turnierbaum bearbeiten</button>`;
  return h || `<div style="color:var(--muted);font-size:12px">Keine Daten vorhanden.</div>`;
}

  let rHtml = rounds.map((r,ri) => `
    <div style="background:var(--bg3);border:1px solid var(--b1);border-radius:8px;padding:10px;margin-bottom:8px">
      <div style="font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:var(--amber);margin-bottom:8px">${r.name}</div>

        <div style="margin-bottom:6px">

  `;

  document.getElementById("hlModal").querySelector(".btn-p").onclick = saveBracket;
  // Fotoalbum-Textarea nach dem Rendern befüllen (vermeidet \n-Escaping im Template)
  const faEl = document.getElementById("hlFotoalbum");

function convertDriveUrl(url) {
  // Google Drive Share-Link → direkter Bildlink
  // Format: https://drive.google.com/file/d/FILE_ID/view?usp=sharing
  const m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w1200`;
  // Falls schon direkter Link oder anderes Format — unverändert lassen
  return url;
}

// URL-Liste für Lightbox

function lbSrc(url) {
  return (url||"").startsWith("http") ? url : FOTO_BASE + url;
}
function lbSetImg(src) {
  const img = document.getElementById("lbImg");
  img.style.opacity = "0";
  img.onload = () => { img.style.opacity = "1"; };
  img.onerror = () => { img.style.opacity = "0.3"; };
  img.src = src;
}
function lbOpenList(list, i) {
  lbCurrentList = Array.isArray(list) ? list : Object.values(list);
  lbIndex = Math.max(0, Math.min(lbCurrentList.length-1, i));
  lbSetImg(lbSrc(lbCurrentList[lbIndex]));
  document.getElementById("lbCount").textContent = (lbIndex+1)+" / "+lbCurrentList.length;
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow = "hidden";
}
function lbOpenCustom(list, i) { lbOpenList(list, i); }
function lbClose() {
  document.getElementById("lightbox").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("lbImg").src = "";
}
function lbMove(dir) {
  if(!lbCurrentList.length) return;
  lbIndex = Math.max(0, Math.min(lbCurrentList.length-1, lbIndex+dir));
  lbSetImg(lbSrc(lbCurrentList[lbIndex]));
  document.getElementById("lbCount").textContent = (lbIndex+1)+" / "+lbCurrentList.length;
}
function lbClickOutside(e) { if(e.target===document.getElementById("lightbox")) lbClose(); }
// Touch-Swipe
document.addEventListener("touchstart", e=>{ if(document.getElementById("lightbox").classList.contains("open")) window._lbSx=e.touches[0].clientX; },{passive:true});
document.addEventListener("touchend", e=>{ if(document.getElementById("lightbox").classList.contains("open")){ const dx=e.changedTouches[0].clientX-(window._lbSx||0); if(Math.abs(dx)>50)lbMove(dx<0?1:-1); }},{passive:true});
// Tastatur-Support (Pfeiltasten + Escape)
document.addEventListener("keydown", e=>{
  if(!document.getElementById("lightbox").classList.contains("open")) return;
  if(e.key==="ArrowLeft")  lbMove(-1);
  if(e.key==="ArrowRight") lbMove(1);
  if(e.key==="Escape")     lbClose();
});

function openGruppenEingabe(hlIdx) {
  const hl = STATE.highlights[hlIdx];
  const groups = (hl.bracket && hl.bracket.groups) || [];

  // Alle Gruppe-Paarungen generieren die noch nicht als Spiel erfasst sind
  // Oder bereits erfasste Spiele zum Bearbeiten anzeigen
  let rows = "";
  const existingGames = hl.games || [];

  groups.forEach(grp => {
    const teams = grp.teams || [];
    rows += `<div style="font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;
      color:var(--blue2);margin:10px 0 6px;letter-spacing:.5px">${grp.name}</div>`;

    // Alle Paarungen in der Gruppe
    for(let i=0; i<teams.length; i++) {
      for(let j=i+1; j<teams.length; j++) {
        const tH = teams[i].name, tA = teams[j].name;
        // Existierendes Spiel suchen
        const ex = existingGames.find(g =>
          (g.teamHome===tH && g.teamAway===tA) ||
          (g.teamHome===tA && g.teamAway===tH)
        );
        const sH = ex ? (ex.teamHome===tH ? (ex.scoreH??'') : (ex.scoreA??'')) : '';
        const sA = ex ? (ex.teamHome===tH ? (ex.scoreA??'') : (ex.scoreH??'')) : '';
        const exId = ex ? ex.id : '';
        const isOurs = tH.includes("Unterweser") || tA.includes("Unterweser");

        rows += `<div style="background:${isOurs?'rgba(90,174,255,.06)':'var(--bg3)'};
          border:1px solid var(--b${isOurs?'2':'1'});border-radius:8px;
          padding:8px 10px;margin-bottom:6px"
          data-eid="${exId}" data-th="${tH}" data-ta="${tA}" data-grp="${grp.name}">
          <div style="font-size:11px;color:var(--text);margin-bottom:6px;font-weight:${isOurs?700:400}">
            ${tH} vs ${tA}
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <input type="number" min="0" placeholder="–"
              style="width:52px;text-align:center;padding:6px;font-size:16px;font-weight:700"
              class="ge-sh" value="${sH}"/>
            <span style="color:var(--muted);font-weight:700">:</span>
            <input type="number" min="0" placeholder="–"
              style="width:52px;text-align:center;padding:6px;font-size:16px;font-weight:700"
              class="ge-sa" value="${sA}"/>
            <span style="font-size:10px;color:var(--muted);flex:1;text-align:right">
              ${sH!==''&&sA!==''?'&#9989; eingetragen':'ausstehend'}
            </span>
          </div>
          ${isOurs?`<div style="margin-top:6px">
            <input placeholder="Torschützen: Leon 5 Tore; Max 3 Tore (optional)"
              style="font-size:11px;padding:5px 8px" class="ge-note"
              value="${ex&&ex.note?ex.note:''}"/>
          </div>`:''}
        </div>`;
      }
    }
  });

  document.getElementById("hlModalContent").innerHTML = `
    <div style="font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;
      color:var(--white);margin-bottom:4px">&#9998; Gruppenspiele</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px">
      Ergebnisse eintragen — Tabelle wird automatisch berechnet
    </div>
    <div id="geRows">${rows}</div>
    <input type="hidden" id="geHlIdx" value="${hlIdx}"/>
  `;
  document.getElementById("hlModal").querySelector(".btn-p").onclick = saveGruppenEingabe;
  openModal("hlModal");
}

function sameMatch(g, tH, tA) {
  // Prüft ob ein Spiel dieselbe Paarung ist (egal welche Richtung)
  return (g.teamHome === tH && g.teamAway === tA) ||
         (g.teamHome === tA && g.teamAway === tH);
}

function saveGruppenEingabe() {
  const hlIdx = parseInt(document.getElementById("geHlIdx").value);
  const hl = STATE.highlights[hlIdx];
  if(!hl.games) hl.games = [];

  const rows = document.getElementById("geRows").querySelectorAll("[data-th]");
  rows.forEach(row => {
    const tH     = row.dataset.th;
    const tA     = row.dataset.ta;
    const grp    = row.dataset.grp;
    const shEl   = row.querySelector(".ge-sh");
    const saEl   = row.querySelector(".ge-sa");
    const noteEl = row.querySelector(".ge-note");
    const sh = shEl && shEl.value !== "" ? parseInt(shEl.value) : undefined;
    const sa = saEl && saEl.value !== "" ? parseInt(saEl.value) : undefined;
    const note = noteEl ? noteEl.value.trim() : "";

    if(sh === undefined && sa === undefined) return; // Leer — nicht speichern

    // Bestehendes Spiel mit dieser Paarung suchen (egal ob über addHLGame oder frühere Eingabe)
    const existIdx = hl.games.findIndex(g => sameMatch(g, tH, tA));
    const existGame = existIdx !== -1 ? hl.games[existIdx] : null;

    // Tore korrekt zuordnen je nach Richtung des bestehenden Eintrags
    let finalScoreH = sh, finalScoreA = sa;
    let finalTeamH = tH, finalTeamA = tA;
    if(existGame && existGame.teamHome === tA) {
      // Bestehendes Spiel hat umgekehrte Richtung → anpassen
      finalScoreH = sa; finalScoreA = sh;
      finalTeamH = tA; finalTeamA = tH;
    }

    const game = {
      id: existGame ? existGame.id : (Date.now().toString() + Math.random().toString(36).slice(2,6)),
      round: grp,
      date:  existGame ? (existGame.date||"") : "",
      time:  existGame ? (existGame.time||"") : "",
      teamHome: finalTeamH,
      teamAway: finalTeamA,
      isHome: finalTeamH.includes("Unterweser"),
      venue: existGame ? (existGame.venue||"Sportcentrum Valkenhuizen") : "Sportcentrum Valkenhuizen",
      scoreH: finalScoreH,
      scoreA: finalScoreA,
      note: note || (existGame ? (existGame.note||"") : ""),
      pdf: existGame ? (existGame.pdf||"") : ""
    };

    if(existIdx !== -1) {
      hl.games[existIdx] = game; // Update
    } else {
      hl.games.push(game);       // Neu
    }
  });

  document.getElementById("hlModal").querySelector(".btn-p").onclick = saveHighlight;
  saveAll().then(() => {
    toast("&#9989; Gruppenspiele gespeichert");
    closeModal("hlModal");
    renderHighlights();
  });
}

function renderEnter() {
  const el = document.getElementById("view-enter");
  if(!STATE.isAdmin) {
    el.innerHTML = `<div style="text-align:center;padding:40px">
      <div style="font-size:48px;margin-bottom:16px">&#128273;</div>
      <div style="font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--white);margin-bottom:8px">Admin-Bereich</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px">Bitte mit PIN anmelden.</div>
      <button class="btn btn-p" style="max-width:200px;margin:0 auto" onclick="openPin()">&#128273; Anmelden</button>
    </div>`;
    return;
  }

  // Welche Saison soll bearbeitet werden
  const sId = STATE.activeSeason;
  const season = STATE.seasons[sId];
  const editGame = season.games.find(g=>g.id===STATE.editId);

  let h = `<div class="shdr" style="margin-top:0">Admin · ${season.name}</div>`;

  // Tabellenplatz
  h += `<div class="card">
    <label>Aktueller Tabellenplatz</label>
    <input type="number" id="rankInput" value="${season.rank||''}" placeholder="z.B. 5"/>
    <button class="btn btn-p" onclick="saveRank()">&#128190; Tabellenplatz speichern</button>
  </div>`;

  // Spiel bearbeiten
  if(editGame) {
    h += `<div class="shdr">Spiel bearbeiten: ${editGame.round}</div>`;
    h += gameFormHTML(editGame);
    h += `<button class="btn btn-p" onclick="saveGame()">&#128190; Speichern</button>`;
    h += `<button class="btn btn-d" onclick="STATE.editId=null;renderEnter()">&#10006; Abbrechen</button>`;
  } else {
    h += `<div class="shdr">Spiele bearbeiten</div>`;
    season.games.forEach(g => {
      h += `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--b1)">
        <div>
          <div style="font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--white)">${g.round}</div>
          <div style="font-size:11px;color:var(--muted)">${fmtDate(g.date)} · ${g.isHome?g.teamAway:g.teamHome}</div>
        </div>
        <button class="btn btn-g btn-sm" style="margin:0;width:auto" onclick="startEdit('${g.id}')">&#9998;</button>
      </div>`;
    });
  }

  // Neue Saison 2026/27 Spiele
  h += `<div class="shdr">Saison 2026/27 verwalten</div>
  <div class="card" style="font-size:12px;color:var(--muted);line-height:1.6">
    Neue Saison über Saison-Switcher oben auswählen (2026/27), dann Spiele hier eintragen.
    <button class="btn btn-g btn-sm" style="margin-top:10px" onclick="addNewGame()">&#43; Neues Spiel (2026/27)</button>
  </div>`;

  // Apps Script
  h += `<div class="shdr">Google Sheets</div>
  <div class="card">
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Apps Script Code für Google Sheets (JSONP-kompatibel)</div>
    <button class="btn btn-g btn-sm" onclick="copyAppsScript()">&#128203; Apps Script Code kopieren</button>
  </div>`;

  // Logout
  h += `<button class="btn btn-d" style="margin-top:8px" onclick="STATE.isAdmin=false;updateAdminUI();renderEnter()">&#128274; Admin-Modus beenden</button>`;

  // Systeminformation
  h += `<div style="margin-top:20px;padding:14px;background:var(--panel);border:1px solid var(--b1);border-radius:var(--r);text-align:center">
    <div style="font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Systeminformation</div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--white)">NBoeger</div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px">Systemverantwortlicher &amp; Entwickler</div>
    <a href="mailto:nboeger.nb@gmail.com" style="display:inline-block;margin-top:6px;font-size:11px;color:var(--blue2);text-decoration:none">nboeger.nb@gmail.com</a>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--b1);font-size:10px;color:var(--muted)">HSG Unterweser CII · App Version 5.0</div>
  </div>`;

  el.innerHTML = h;
}

function gameFormHTML(g) {
  return `<div class="card">
    <label>Runde</label><input id="eRound" value="${g.round||''}"/>
    <div class="row2">
      <div><label>Datum</label><input type="date" id="eDate" value="${g.date||''}"/></div>
      <div><label>Uhrzeit</label><input type="time" id="eTime" value="${g.time||''}"/></div>
    </div>
    <label>Heimteam</label><input id="eTeamH" value="${g.teamHome||''}"/>
    <label>Gastteam</label><input id="eTeamA" value="${g.teamAway||''}"/>
    <label>Spielort</label><input id="eVenue" value="${g.venue||''}"/>
    <div class="row2">
      <div><label>Tore Heim</label><input type="number" id="eScoreH" value="${g.scoreH??''}"/></div>
      <div><label>Tore Gast</label><input type="number" id="eScoreA" value="${g.scoreA??''}"/></div>
    </div>
    <label>Torschützen (Leon 5 Tore; Max 3 Tore; Ben 2 Tore (7M 1/1))</label>
    <textarea id="eNote" rows="3">${g.note||''}</textarea>
    <label>PDF-Spielbericht URL</label><input id="ePdf" value="${g.pdf||''}"/>
  </div>`;
}

function startEdit(id) { STATE.editId = id; renderEnter(); setTimeout(()=>document.getElementById("view-enter").scrollTop=200,50); }

function saveGame() {
  const s = STATE.seasons[STATE.activeSeason];
  const idx = s.games.findIndex(g=>g.id===STATE.editId);
  if(idx<0) return;
  const g = s.games[idx];
  g.round  = document.getElementById("eRound").value.trim();
  g.date   = document.getElementById("eDate").value;
  g.time   = document.getElementById("eTime").value;
  g.teamHome = document.getElementById("eTeamH").value.trim();
  g.teamAway = document.getElementById("eTeamA").value.trim();
  g.isHome = g.teamHome.includes("HSG Unterweser");
  g.venue  = document.getElementById("eVenue").value.trim();
  const sh = document.getElementById("eScoreH").value;
  const sa = document.getElementById("eScoreA").value;
  g.scoreH = sh!==""?parseInt(sh):undefined;
  g.scoreA = sa!==""?parseInt(sa):undefined;
  g.note   = document.getElementById("eNote").value.trim();
  g.pdf    = document.getElementById("ePdf").value.trim();
  STATE.editId = null;
  saveAll().then(ok => {
    toast(ok?"&#9989; Gespeichert":"&#9651; Lokal gespeichert");
    renderEnter();
  });
}

function saveRank() {
  const v = parseInt(document.getElementById("rankInput").value);
  if(!isNaN(v)) STATE.seasons[STATE.activeSeason].rank = v;
  saveAll().then(ok => toast(ok?"&#9989; Tabellenplatz gespeichert":"&#9651; Lokal gespeichert"));
}

function addNewGame() {
  // Switch zu 2026-27 und neues leeres Spiel hinzufügen
  switchSeason("2026-27");
  const id = Date.now().toString();
  STATE.seasons["2026-27"].games.push({
    id, date:"", time:"", round:"1. Spieltag",
    isHome:true, teamHome:"HSG Unterweser CII", teamAway:"",
    venue:"", pdf:"", note:""
  });
  STATE.editId = id;
  showTab("enter", document.querySelectorAll(".tab")[6]);
}

function copyAppsScript() {
  const code = `function doGet(e) {
  var ss = SpreadsheetApp.openById("1UHvZH6Ic7qLCwLkyQbEoiihaQbhH2eCVxE0xePmt54E");
  var sheet = ss.getSheetByName("Daten") || ss.insertSheet("Daten");
  var raw = sheet.getRange(1,1).getValue();
  var result = raw ? JSON.parse(raw) : {seasons:{},highlights:[]};
  var action = e.parameter.action || "read";
  var cb = e.parameter.callback;

  if (action === "write") {
    var dataParam = e.parameter.data;
    if (dataParam) {
      sheet.getRange(1,1).setValue(dataParam);
    }
    var writePayload = JSON.stringify({ok:true});
    if (cb) {
      return ContentService
        .createTextOutput(cb + "(" + writePayload + ")")
        .setMimeType(ContentService.MimeType.JAVASCRIPT);
    }
    return ContentService
      .createTextOutput(writePayload)
      .setMimeType(ContentService.MimeType.JSON);
  }

  var payload = JSON.stringify({ok:true, data:result});
  if (cb) {
    return ContentService
      .createTextOutput(cb + "(" + payload + ")")
      .setMimeType(ContentService.MimeType.JAVASCRIPT);
  }
  return ContentService
    .createTextOutput(payload)
    .setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  var ss = SpreadsheetApp.openById(\"1UHvZH6Ic7qLCwLkyQbEoiihaQbhH2eCVxE0xePmt54E\");
  var sheet = ss.getSheetByName(\"Daten\") || ss.insertSheet(\"Daten\");
  try {
    var body = JSON.parse(e.postData.contents);
    if (body.action === \"write\" && body.data) {
      sheet.getRange(1,1).setValue(JSON.stringify(body.data));
    }
  } catch(err) {}
  return ContentService
    .createTextOutput(JSON.stringify({ok:true}))
    .setMimeType(ContentService.MimeType.JSON);
}`;
  navigator.clipboard.writeText(code)
    .then(()=>toast("&#9989; Code kopiert!"))
    .catch(()=>toast("Kopieren fehlgeschlagen",true));
}

function openModal(id) { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }
function openPin() { document.getElementById("pinInput").value=""; document.getElementById("pinErr").style.display="none"; openModal("pinModal"); }
function checkPin() {
  if(document.getElementById("pinInput").value===ADMIN_PIN) {
    STATE.isAdmin=true; updateAdminUI(); closeModal("pinModal");
    toast("&#9989; Admin-Modus aktiviert"); renderEnter();
  } else {
    document.getElementById("pinErr").style.display="block";
    document.getElementById("pinInput").value="";
  }
}
function updateAdminUI() {
  document.getElementById("adminDot").style.display=STATE.isAdmin?"block":"none";
  document.getElementById("btnPin").style.display=STATE.isAdmin?"none":"block";
}
let toastTimer;
function toast(msg) {
  const t=document.getElementById("toast"); t.innerHTML=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2500);
}

// iOS HEIGHT FIX
// ═══════════════════════════════════════
function fixIOSHeight() {
  const app=document.querySelector(".app");
  if(app) app.style.height=window.innerHeight+"px";
}
if(/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
  fixIOSHeight();
  window.addEventListener("resize",fixIOSHeight);
  window.addEventListener("orientationchange",()=>setTimeout(fixIOSHeight,300));
}
